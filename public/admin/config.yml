# =============================================================================
# Sveltia CMS — configurazione
#
# I campi qui sotto RISPECCHIANO ESATTAMENTE gli schemi Astro in
# src/content.config.ts. Sono campi fissi e strutturati: NESSUN HTML libero,
# così la redazione non può rompere il layout del sito.
# =============================================================================

backend:
  name: github
  repo: formahub3d-cloud/centioniproduzioni
  # ⚠️ Imposta il branch di PRODUZIONE (quello pubblicato da Cloudflare Pages).
  # Per ora è il branch di sviluppo; in Fase 3, dopo il merge, metti `main`.
  branch: claude/niccolo-portfolio-blog-bhb076
  # --- Fase 3: autenticazione tramite Cloudflare Worker (sveltia-cms-auth) ---
  # base_url: https://<tuo-worker>.workers.dev
  # auth_endpoint: /auth

# Per provare il CMS in locale con un proxy git (facoltativo):
#   npx @sveltia/cms-proxy-server   →  poi imposta local_backend: true
# local_backend: true

site_url: https://centioniproduzioni.it
display_url: https://centioniproduzioni.it
logo_url: /logo-mark.svg

# --- Cartella media UNICA e condivisa (stessa del sito) ---
# public_folder relativo: scrive nel frontmatter "../../assets/media/<file>",
# il percorso che Astro si aspetta per l'ottimizzazione immagini.
media_folder: "src/assets/media"
public_folder: "../../assets/media"

# Lingua dell'interfaccia
locale: it

collections:
  # ===========================================================================
  # NEWS  →  src/content/news/*.md
  # ===========================================================================
  - name: news
    label: News
    label_singular: Articolo
    description: Articoli e aggiornamenti.
    folder: src/content/news
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{date}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: Titolo, widget: string }
      - {
          name: date,
          label: Data,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "DD/MM/YYYY",
          time_format: false,
        }
      - {
          name: cover,
          label: Copertina,
          widget: image,
          required: false,
          hint: "Immagine in evidenza (consigliata 16:10, lato lungo ≥ 1600px).",
        }
      - {
          name: excerpt,
          label: Estratto,
          widget: text,
          hint: "Breve riassunto mostrato nelle anteprime.",
        }
      - {
          name: tags,
          label: Tag,
          widget: list,
          required: false,
          hint: "Aggiungi una o più etichette.",
        }
      - {
          name: draft,
          label: Bozza,
          widget: boolean,
          default: false,
          hint: "Se attivo, l'articolo NON viene pubblicato.",
        }
      - { name: body, label: Contenuto, widget: markdown }

  # ===========================================================================
  # PRODUZIONI  →  src/content/produzioni/*.md  (solo frontmatter, niente corpo)
  # ===========================================================================
  - name: produzioni
    label: Produzioni
    label_singular: Produzione
    description: Le produzioni video (in corso e in uscita).
    folder: src/content/produzioni
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{status}}"
    sortable_fields: [order, title]
    fields:
      - { name: title, label: Titolo, widget: string }
      - {
          name: status,
          label: Stato,
          widget: select,
          default: in-uscita,
          options:
            [
              { label: "In corso", value: in-corso },
              { label: "In uscita", value: in-uscita },
            ],
          hint: "‘In corso’ mostra l'embed YouTube; ‘In uscita’ mostra la card Coming Soon.",
        }
      - {
          name: cover,
          label: Copertina,
          widget: image,
          required: false,
          hint: "Copertina del progetto (consigliata 16:9).",
        }
      - {
          name: youtube,
          label: ID video YouTube,
          widget: string,
          required: false,
          hint: "Solo l'ID (es. da youtube.com/watch?v=ABC123 → ABC123).",
        }
      - {
          name: video,
          label: Link video esterno,
          widget: string,
          required: false,
          hint: "Alternativa a YouTube: URL completo (https://…).",
        }
      - {
          name: releaseLabel,
          label: Etichetta di uscita,
          widget: string,
          required: false,
          hint: "Es. ‘In uscita · Agosto 2026’.",
        }
      - {
          name: description,
          label: Descrizione,
          widget: text,
          required: false,
        }
      - {
          name: order,
          label: Ordine,
          widget: number,
          default: 0,
          value_type: int,
          hint: "Numero più basso = mostrato prima.",
        }
      - {
          name: draft,
          label: Bozza,
          widget: boolean,
          default: false,
        }
